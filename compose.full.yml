services:
  backend:
    image: python:3.14-slim
    working_dir: /app
    volumes:
      - ./backend:/app
      - ./data:/app/data
    env_file:
      - ./backend/.env
    environment:
      INSIGHT_AGENT_DATABASE_URL: postgresql://insight:insight@postgres:5432/insightagent
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    command: >
      sh -c "pip install -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      - chroma

  frontend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    command: >
      sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3001"
    ports:
      - "3001:3001"
    depends_on:
      - backend

  chroma:
    image: chromadb/chroma:latest
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: insight
      POSTGRES_PASSWORD: insight
      POSTGRES_DB: insightagent
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  chroma_data:
  pg_data:
