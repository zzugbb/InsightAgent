name: backend-e2e

on:
  workflow_dispatch:
    inputs:
      export_diag_strict_level:
        description: "Override export diagnostics strict level (auto/none/p0/any)"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - none
          - p0
          - any
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-e2e.yml"
      - "compose.full.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-e2e.yml"
      - "compose.full.yml"

env:
  BACKEND_EXPORT_DIAG_STRICT_LEVEL_DEFAULT: "p0"
  BACKEND_EXPORT_DIAG_STRICT_LEVEL_MAIN_PUSH: "any"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: insight
          POSTGRES_PASSWORD: insight
          POSTGRES_DB: insightagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U insight -d insightagent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      chroma:
        image: chromadb/chroma:latest
        env:
          IS_PERSISTENT: "FALSE"
          ANONYMIZED_TELEMETRY: "FALSE"
        ports:
          - 8001:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start backend on :8000 (default timeout)
        env:
          INSIGHT_AGENT_DATABASE_URL: postgresql://insight:insight@127.0.0.1:5432/insightagent
          CHROMA_HOST: 127.0.0.1
          CHROMA_PORT: "8001"
        run: |
          bash scripts/ci_boot_backend_instance.sh \
            --port 8000 \
            --log-file /tmp/backend-8000.log \
            --pid-file /tmp/backend-8000.pid \
            --failure-message "backend :8000 failed to become healthy"

      - name: Run baseline/main-path/export/cancel e2e on :8000
        run: |
          bash scripts/ci_run_backend_e2e.sh \
            --phase main \
            --base-url http://127.0.0.1:8000 \
            --log-dir /tmp

      - name: Start backend on :8010 (timeout=1s)
        env:
          INSIGHT_AGENT_DATABASE_URL: postgresql://insight:insight@127.0.0.1:5432/insightagent
          CHROMA_HOST: 127.0.0.1
          CHROMA_PORT: "8001"
          TASK_TIMEOUT_SEC: "1"
        run: |
          bash scripts/ci_boot_backend_instance.sh \
            --port 8010 \
            --log-file /tmp/backend-8010.log \
            --pid-file /tmp/backend-8010.pid \
            --failure-message "backend :8010 failed to become healthy"

      - name: Run timeout e2e on :8010
        run: |
          bash scripts/ci_run_backend_e2e.sh \
            --phase timeout \
            --base-url http://127.0.0.1:8010 \
            --log-dir /tmp

      - name: Validate e2e tooling fixtures (backend scope)
        run: bash scripts/test_ci_e2e_tooling.sh backend

      - name: Finalize backend diagnostics and artifacts
        id: finalize_backend
        if: always()
        run: |
          dispatch_override="${{ github.event.inputs.export_diag_strict_level || '' }}"
          bash scripts/ci_finalize_e2e_scope.sh \
            --scope backend \
            --event-name "${GITHUB_EVENT_NAME}" \
            --ref "${GITHUB_REF}" \
            --default-level "${BACKEND_EXPORT_DIAG_STRICT_LEVEL_DEFAULT}" \
            --main-push-level "${BACKEND_EXPORT_DIAG_STRICT_LEVEL_MAIN_PUSH}" \
            --dispatch-override "${dispatch_override:-auto}" \
            --github-output-file "$GITHUB_OUTPUT" \
            --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          bash scripts/ci_collect_backend_failure_diagnostics.sh \
            --output-file /tmp/backend-e2e-diagnostics.txt \
            --primary-health-url http://127.0.0.1:8000/health \
            --secondary-health-url http://127.0.0.1:8010/health \
            --export-log-file /tmp/e2e-export-consistency-8000.log \
            --export-log-tail-lines 80

      - name: Show backend logs on failure
        if: failure()
        run: |
          bash scripts/ci_print_log_files.sh \
            --title "backend e2e backend logs" \
            --file /tmp/backend-8000.log \
            --file /tmp/backend-8010.log

      - name: Upload backend e2e artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-e2e-artifacts
          path: ${{ steps.finalize_backend.outputs.artifacts_stage_dir }}
          if-no-files-found: ignore
