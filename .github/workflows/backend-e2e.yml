name: backend-e2e

on:
  workflow_dispatch:
    inputs:
      export_diag_strict_level:
        description: "Override export diagnostics strict level (auto/none/p0/any)"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - none
          - p0
          - any
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-e2e.yml"
      - "compose.full.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-e2e.yml"
      - "compose.full.yml"

env:
  BACKEND_EXPORT_DIAG_STRICT_LEVEL_DEFAULT: "p0"
  BACKEND_EXPORT_DIAG_STRICT_LEVEL_MAIN_PUSH: "any"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: insight
          POSTGRES_PASSWORD: insight
          POSTGRES_DB: insightagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U insight -d insightagent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      chroma:
        image: chromadb/chroma:latest
        env:
          IS_PERSISTENT: "FALSE"
          ANONYMIZED_TELEMETRY: "FALSE"
        ports:
          - 8001:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start backend on :8000 (default timeout)
        env:
          INSIGHT_AGENT_DATABASE_URL: postgresql://insight:insight@127.0.0.1:5432/insightagent
          CHROMA_HOST: 127.0.0.1
          CHROMA_PORT: "8001"
        run: |
          nohup uvicorn app.main:app --app-dir backend --host 127.0.0.1 --port 8000 >/tmp/backend-8000.log 2>&1 &
          echo $! > /tmp/backend-8000.pid

      - name: Wait backend :8000 health
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /tmp/health-8000.json -w "%{http_code}" http://127.0.0.1:8000/health || true)
            if [ "$code" = "200" ]; then
              cat /tmp/health-8000.json
              exit 0
            fi
            sleep 1
          done
          echo "backend :8000 failed to become healthy"
          cat /tmp/backend-8000.log || true
          exit 1

      - name: Run baseline/main-path/export/cancel e2e on :8000
        run: |
          set -o pipefail
          python3 backend/scripts/e2e_baseline.py --base-url http://127.0.0.1:8000 \
            | tee /tmp/e2e-baseline-8000.log
          python3 backend/scripts/e2e_main_path.py --base-url http://127.0.0.1:8000 \
            | tee /tmp/e2e-main-path-8000.log
          python3 backend/scripts/e2e_export_consistency.py --base-url http://127.0.0.1:8000 \
            | tee /tmp/e2e-export-consistency-8000.log
          python3 backend/scripts/e2e_task_cancel_timeout.py --base-url http://127.0.0.1:8000 --skip-timeout \
            | tee /tmp/e2e-cancel-8000.log

      - name: Start backend on :8010 (timeout=1s)
        env:
          INSIGHT_AGENT_DATABASE_URL: postgresql://insight:insight@127.0.0.1:5432/insightagent
          CHROMA_HOST: 127.0.0.1
          CHROMA_PORT: "8001"
          TASK_TIMEOUT_SEC: "1"
        run: |
          nohup uvicorn app.main:app --app-dir backend --host 127.0.0.1 --port 8010 >/tmp/backend-8010.log 2>&1 &
          echo $! > /tmp/backend-8010.pid

      - name: Wait backend :8010 health
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /tmp/health-8010.json -w "%{http_code}" http://127.0.0.1:8010/health || true)
            if [ "$code" = "200" ]; then
              cat /tmp/health-8010.json
              exit 0
            fi
            sleep 1
          done
          echo "backend :8010 failed to become healthy"
          cat /tmp/backend-8010.log || true
          exit 1

      - name: Run timeout e2e on :8010
        run: |
          set -o pipefail
          python3 backend/scripts/e2e_task_cancel_timeout.py \
            --base-url http://127.0.0.1:8010 \
            --cancel-prompt-words 180000 \
            --timeout-prompt-words 250000 \
            | tee /tmp/e2e-timeout-8010.log

      - name: Validate export consistency summary fixture tests
        run: bash backend/scripts/test_ci_export_consistency_summary.sh

      - name: Validate diagnostics overview fixture tests
        run: bash scripts/test_ci_export_diagnostics_overview.sh

      - name: Summarize export consistency checks
        if: always()
        run: |
          bash backend/scripts/ci_export_consistency_summary.sh /tmp/e2e-export-consistency-8000.log /tmp/e2e-export-consistency-summary.json \
            | tee /tmp/e2e-export-consistency-summary.txt

          {
            echo "### backend-e2e export consistency"
            cat /tmp/e2e-export-consistency-summary.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Evaluate export diagnostics guard
        if: always()
        id: backend_diag_guard
        run: |
          dispatch_override="${{ github.event.inputs.export_diag_strict_level || '' }}"
          strict_level="${BACKEND_EXPORT_DIAG_STRICT_LEVEL_DEFAULT}"
          policy_source="default"

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            strict_level="${BACKEND_EXPORT_DIAG_STRICT_LEVEL_MAIN_PUSH}"
            policy_source="main_push"
          fi
          if [ -n "${dispatch_override}" ] && [ "${dispatch_override}" != "auto" ]; then
            strict_level="${dispatch_override}"
            policy_source="workflow_dispatch_input"
          fi

          bash scripts/ci_diag_guard.sh \
            --json /tmp/e2e-export-consistency-summary.json \
            --scope backend \
            --strict-level "${strict_level}" \
            --label backend-e2e-export \
            --summary-file /tmp/backend-e2e-export-guard-summary.md \
            --json-summary-file /tmp/backend-e2e-export-guard-summary.json

          echo "strict_level=${strict_level}" >> "$GITHUB_OUTPUT"
          echo "policy_source=${policy_source}" >> "$GITHUB_OUTPUT"

          {
            echo "### backend-e2e export diagnostics guard"
            echo "- policy: default=${BACKEND_EXPORT_DIAG_STRICT_LEVEL_DEFAULT}, main_push=${BACKEND_EXPORT_DIAG_STRICT_LEVEL_MAIN_PUSH}"
            echo "- dispatch_override: ${dispatch_override:-<none>}"
            echo "- policy_source: ${policy_source}"
            echo "- selected_strict_level: ${strict_level}"
            cat /tmp/backend-e2e-export-guard-summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build export diagnostics overview
        if: always()
        run: |
          bash scripts/ci_export_diagnostics_overview.sh \
            --backend-diagnostics-json /tmp/e2e-export-consistency-summary.json \
            --backend-guard-json /tmp/backend-e2e-export-guard-summary.json \
            --markdown-out /tmp/backend-e2e-export-overview.md \
            --json-out /tmp/backend-e2e-export-overview.json \
            --label backend-e2e

          {
            echo "### backend-e2e export diagnostics overview"
            cat /tmp/backend-e2e-export-overview.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          {
            echo "===== date ====="
            date -u
            echo ""
            echo "===== ps -ef (python/uvicorn) ====="
            ps -ef | grep -E "python|uvicorn" || true
            echo ""
            echo "===== health :8000 ====="
            curl -i -m 5 http://127.0.0.1:8000/health || true
            echo ""
            echo "===== health :8010 ====="
            curl -i -m 5 http://127.0.0.1:8010/health || true
            echo ""
            echo "===== export consistency tail ====="
            tail -n 80 /tmp/e2e-export-consistency-8000.log || true
          } > /tmp/backend-e2e-diagnostics.txt

      - name: Show backend logs on failure
        if: failure()
        run: |
          echo "===== backend-8000.log ====="
          cat /tmp/backend-8000.log || true
          echo "===== backend-8010.log ====="
          cat /tmp/backend-8010.log || true

      - name: Upload backend e2e artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-e2e-artifacts
          path: |
            /tmp/backend-8000.log
            /tmp/backend-8010.log
            /tmp/health-8000.json
            /tmp/health-8010.json
            /tmp/e2e-main-path-8000.log
            /tmp/e2e-baseline-8000.log
            /tmp/e2e-export-consistency-8000.log
            /tmp/e2e-export-consistency-summary.txt
            /tmp/e2e-export-consistency-summary.json
            /tmp/backend-e2e-export-guard-summary.md
            /tmp/backend-e2e-export-guard-summary.json
            /tmp/backend-e2e-export-overview.md
            /tmp/backend-e2e-export-overview.json
            /tmp/e2e-cancel-8000.log
            /tmp/e2e-timeout-8010.log
            /tmp/backend-e2e-diagnostics.txt
          if-no-files-found: ignore
