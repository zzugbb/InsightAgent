name: backend-e2e

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-e2e.yml"
      - "compose.full.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-e2e.yml"
      - "compose.full.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: insight
          POSTGRES_PASSWORD: insight
          POSTGRES_DB: insightagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U insight -d insightagent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      chroma:
        image: chromadb/chroma:latest
        env:
          IS_PERSISTENT: "FALSE"
          ANONYMIZED_TELEMETRY: "FALSE"
        ports:
          - 8001:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start backend on :8000 (default timeout)
        env:
          INSIGHT_AGENT_DATABASE_URL: postgresql://insight:insight@127.0.0.1:5432/insightagent
          CHROMA_HOST: 127.0.0.1
          CHROMA_PORT: "8001"
        run: |
          nohup uvicorn app.main:app --app-dir backend --host 127.0.0.1 --port 8000 >/tmp/backend-8000.log 2>&1 &
          echo $! > /tmp/backend-8000.pid

      - name: Wait backend :8000 health
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /tmp/health-8000.json -w "%{http_code}" http://127.0.0.1:8000/health || true)
            if [ "$code" = "200" ]; then
              cat /tmp/health-8000.json
              exit 0
            fi
            sleep 1
          done
          echo "backend :8000 failed to become healthy"
          cat /tmp/backend-8000.log || true
          exit 1

      - name: Run baseline/main-path/export/cancel e2e on :8000
        run: |
          set -o pipefail
          python3 backend/scripts/e2e_baseline.py --base-url http://127.0.0.1:8000 \
            | tee /tmp/e2e-baseline-8000.log
          python3 backend/scripts/e2e_main_path.py --base-url http://127.0.0.1:8000 \
            | tee /tmp/e2e-main-path-8000.log
          python3 backend/scripts/e2e_export_consistency.py --base-url http://127.0.0.1:8000 \
            | tee /tmp/e2e-export-consistency-8000.log
          python3 backend/scripts/e2e_task_cancel_timeout.py --base-url http://127.0.0.1:8000 --skip-timeout \
            | tee /tmp/e2e-cancel-8000.log

      - name: Start backend on :8010 (timeout=1s)
        env:
          INSIGHT_AGENT_DATABASE_URL: postgresql://insight:insight@127.0.0.1:5432/insightagent
          CHROMA_HOST: 127.0.0.1
          CHROMA_PORT: "8001"
          TASK_TIMEOUT_SEC: "1"
        run: |
          nohup uvicorn app.main:app --app-dir backend --host 127.0.0.1 --port 8010 >/tmp/backend-8010.log 2>&1 &
          echo $! > /tmp/backend-8010.pid

      - name: Wait backend :8010 health
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /tmp/health-8010.json -w "%{http_code}" http://127.0.0.1:8010/health || true)
            if [ "$code" = "200" ]; then
              cat /tmp/health-8010.json
              exit 0
            fi
            sleep 1
          done
          echo "backend :8010 failed to become healthy"
          cat /tmp/backend-8010.log || true
          exit 1

      - name: Run timeout e2e on :8010
        run: |
          set -o pipefail
          python3 backend/scripts/e2e_task_cancel_timeout.py \
            --base-url http://127.0.0.1:8010 \
            --cancel-prompt-words 180000 \
            --timeout-prompt-words 250000 \
            | tee /tmp/e2e-timeout-8010.log

      - name: Summarize export consistency checks
        if: always()
        run: |
          {
            echo "## Export Consistency Snapshot"
            if [ -f /tmp/e2e-export-consistency-8000.log ]; then
              STEP_REGEX="^\[[0-9]+/[0-9]+\]"
              OK_LINE_REGEX="^  - OK:"
              PASS_BANNER_REGEX="^E2E export consistency passed:"
              TASK_EXPORT_REGEX="task export json/markdown consistency \+ download"
              SESSION_EXPORT_REGEX="session export json/markdown consistency \+ download"
              SHARED_RAG_REGEX="shared-rag role semantics remain compatible with export flow"
              CROSS_USER_REGEX="cross-user export isolation checks"
              NOT_FOUND_REGEX="export not-found responses"
              KEY_LINES_REGEX="^\\[[0-9]+/[0-9]+\\]|^  - OK:|^E2E export consistency passed:|^- "

              step_count=$(grep -Ec "${STEP_REGEX}" /tmp/e2e-export-consistency-8000.log || true)
              ok_count=$(grep -Ec "${OK_LINE_REGEX}" /tmp/e2e-export-consistency-8000.log || true)
              passed_count=$(grep -Ec "${PASS_BANNER_REGEX}" /tmp/e2e-export-consistency-8000.log || true)
              task_export_ok=$(grep -Ec "${TASK_EXPORT_REGEX}" /tmp/e2e-export-consistency-8000.log || true)
              session_export_ok=$(grep -Ec "${SESSION_EXPORT_REGEX}" /tmp/e2e-export-consistency-8000.log || true)
              shared_rag_ok=$(grep -Ec "${SHARED_RAG_REGEX}" /tmp/e2e-export-consistency-8000.log || true)
              cross_user_ok=$(grep -Ec "${CROSS_USER_REGEX}" /tmp/e2e-export-consistency-8000.log || true)
              not_found_ok=$(grep -Ec "${NOT_FOUND_REGEX}" /tmp/e2e-export-consistency-8000.log || true)
              warning_count=0
              p0_warning_count=0
              p1_warning_count=0
              warning_messages=""

              if [ "${step_count}" -ne 7 ]; then
                warning_count=$((warning_count + 1))
                p0_warning_count=$((p0_warning_count + 1))
                warning_messages="${warning_messages}\n  - [P0][backend-export-consistency] steps_detected expected 7, got ${step_count}"
              fi
              if [ "${ok_count}" -ne 7 ]; then
                warning_count=$((warning_count + 1))
                p0_warning_count=$((p0_warning_count + 1))
                warning_messages="${warning_messages}\n  - [P0][backend-export-consistency] ok_lines_detected expected 7, got ${ok_count}"
              fi
              if [ "${passed_count}" -ne 1 ]; then
                warning_count=$((warning_count + 1))
                p0_warning_count=$((p0_warning_count + 1))
                warning_messages="${warning_messages}\n  - [P0][backend-export-consistency] pass_banner_detected expected 1, got ${passed_count}"
              fi
              if [ "${task_export_ok}" -lt 1 ]; then
                warning_count=$((warning_count + 1))
                p1_warning_count=$((p1_warning_count + 1))
                warning_messages="${warning_messages}\n  - [P1][backend-export-consistency] task_export_consistency_ok expected >=1, got ${task_export_ok}"
              fi
              if [ "${session_export_ok}" -lt 1 ]; then
                warning_count=$((warning_count + 1))
                p1_warning_count=$((p1_warning_count + 1))
                warning_messages="${warning_messages}\n  - [P1][backend-export-consistency] session_export_consistency_ok expected >=1, got ${session_export_ok}"
              fi
              if [ "${shared_rag_ok}" -lt 1 ]; then
                warning_count=$((warning_count + 1))
                p1_warning_count=$((p1_warning_count + 1))
                warning_messages="${warning_messages}\n  - [P1][backend-export-consistency] shared_rag_semantics_ok expected >=1, got ${shared_rag_ok}"
              fi
              if [ "${cross_user_ok}" -lt 1 ]; then
                warning_count=$((warning_count + 1))
                p1_warning_count=$((p1_warning_count + 1))
                warning_messages="${warning_messages}\n  - [P1][backend-export-consistency] cross_user_isolation_ok expected >=1, got ${cross_user_ok}"
              fi
              if [ "${not_found_ok}" -lt 1 ]; then
                warning_count=$((warning_count + 1))
                p1_warning_count=$((p1_warning_count + 1))
                warning_messages="${warning_messages}\n  - [P1][backend-export-consistency] not_found_semantics_ok expected >=1, got ${not_found_ok}"
              fi

              echo ""
              echo "- Script log: /tmp/e2e-export-consistency-8000.log"
              echo "- Assertion counters:"
              echo "  - steps_detected: ${step_count} (expected: 7)"
              echo "  - ok_lines_detected: ${ok_count} (expected: 7)"
              echo "  - pass_banner_detected: ${passed_count} (expected: 1)"
              echo "  - task_export_consistency_ok: ${task_export_ok} (expected: >=1)"
              echo "  - session_export_consistency_ok: ${session_export_ok} (expected: >=1)"
              echo "  - shared_rag_semantics_ok: ${shared_rag_ok} (expected: >=1)"
              echo "  - cross_user_isolation_ok: ${cross_user_ok} (expected: >=1)"
              echo "  - not_found_semantics_ok: ${not_found_ok} (expected: >=1)"
              echo "## threshold alerts"
              if [ "${warning_count}" -gt 0 ]; then
                echo "- total_alerts: ${warning_count}"
                echo "- severity: P0=${p0_warning_count}, P1=${p1_warning_count}"
                printf '%b\n' "${warning_messages}"
              else
                echo "- total_alerts: 0 (all counters within expected range)"
                echo "- severity: P0=0, P1=0"
              fi
              echo "## key lines"
              grep -E "${KEY_LINES_REGEX}" /tmp/e2e-export-consistency-8000.log || true
            else
              echo ""
              echo "- Export consistency log is missing."
            fi
          } | tee /tmp/e2e-export-consistency-summary.txt

          {
            echo "### backend-e2e export consistency"
            cat /tmp/e2e-export-consistency-summary.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          {
            echo "===== date ====="
            date -u
            echo ""
            echo "===== ps -ef (python/uvicorn) ====="
            ps -ef | grep -E "python|uvicorn" || true
            echo ""
            echo "===== health :8000 ====="
            curl -i -m 5 http://127.0.0.1:8000/health || true
            echo ""
            echo "===== health :8010 ====="
            curl -i -m 5 http://127.0.0.1:8010/health || true
            echo ""
            echo "===== export consistency tail ====="
            tail -n 80 /tmp/e2e-export-consistency-8000.log || true
          } > /tmp/backend-e2e-diagnostics.txt

      - name: Show backend logs on failure
        if: failure()
        run: |
          echo "===== backend-8000.log ====="
          cat /tmp/backend-8000.log || true
          echo "===== backend-8010.log ====="
          cat /tmp/backend-8010.log || true

      - name: Upload backend e2e artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-e2e-artifacts
          path: |
            /tmp/backend-8000.log
            /tmp/backend-8010.log
            /tmp/health-8000.json
            /tmp/health-8010.json
            /tmp/e2e-main-path-8000.log
            /tmp/e2e-baseline-8000.log
            /tmp/e2e-export-consistency-8000.log
            /tmp/e2e-export-consistency-summary.txt
            /tmp/e2e-cancel-8000.log
            /tmp/e2e-timeout-8010.log
            /tmp/backend-e2e-diagnostics.txt
          if-no-files-found: ignore
