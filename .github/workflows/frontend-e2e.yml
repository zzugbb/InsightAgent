name: frontend-e2e

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/frontend-e2e.yml"
      - "compose.full.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/frontend-e2e.yml"
      - "compose.full.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: insight
          POSTGRES_PASSWORD: insight
          POSTGRES_DB: insightagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U insight -d insightagent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      chroma:
        image: chromadb/chroma:latest
        env:
          IS_PERSISTENT: "FALSE"
          ANONYMIZED_TELEMETRY: "FALSE"
        ports:
          - 8001:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start backend on :8000
        env:
          INSIGHT_AGENT_DATABASE_URL: postgresql://insight:insight@127.0.0.1:5432/insightagent
          CHROMA_HOST: 127.0.0.1
          CHROMA_PORT: "8001"
        run: |
          nohup uvicorn app.main:app --app-dir backend --host 127.0.0.1 --port 8000 >/tmp/frontend-e2e-backend.log 2>&1 &

      - name: Wait backend health
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /tmp/frontend-e2e-health.json -w "%{http_code}" http://127.0.0.1:8000/health || true)
            if [ "$code" = "200" ]; then
              cat /tmp/frontend-e2e-health.json
              exit 0
            fi
            sleep 1
          done
          echo "backend failed to become healthy"
          cat /tmp/frontend-e2e-backend.log || true
          exit 1

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browser
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run frontend e2e
        run: |
          cd frontend
          PLAYWRIGHT_API_BASE_URL=http://127.0.0.1:8000 \
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:3001 \
          npm run test:e2e -- --project=chromium

      - name: Show backend logs on failure
        if: failure()
        run: |
          echo "===== frontend-e2e-backend.log ====="
          cat /tmp/frontend-e2e-backend.log || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
