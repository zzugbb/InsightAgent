name: frontend-e2e

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/frontend-e2e.yml"
      - "compose.full.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/frontend-e2e.yml"
      - "compose.full.yml"

concurrency:
  group: frontend-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: insight
          POSTGRES_PASSWORD: insight
          POSTGRES_DB: insightagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U insight -d insightagent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      chroma:
        image: chromadb/chroma:latest
        env:
          IS_PERSISTENT: "FALSE"
          ANONYMIZED_TELEMETRY: "FALSE"
        ports:
          - 8001:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start backend on :8000
        env:
          INSIGHT_AGENT_DATABASE_URL: postgresql://insight:insight@127.0.0.1:5432/insightagent
          CHROMA_HOST: 127.0.0.1
          CHROMA_PORT: "8001"
        run: |
          nohup uvicorn app.main:app --app-dir backend --host 127.0.0.1 --port 8000 >/tmp/frontend-e2e-backend.log 2>&1 &

      - name: Wait backend health
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /tmp/frontend-e2e-health.json -w "%{http_code}" http://127.0.0.1:8000/health || true)
            if [ "$code" = "200" ]; then
              cat /tmp/frontend-e2e-health.json
              exit 0
            fi
            sleep 1
          done
          echo "backend failed to become healthy"
          cat /tmp/frontend-e2e-backend.log || true
          exit 1

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browser
        run: cd frontend && npx playwright install --with-deps chromium firefox webkit

      - name: Run frontend smoke e2e matrix
        run: |
          cd frontend
          PLAYWRIGHT_API_BASE_URL=http://127.0.0.1:8000 \
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:3001 \
          npm run test:e2e:smoke:matrix

      - name: Run frontend full e2e on chromium
        run: |
          cd frontend
          PLAYWRIGHT_API_BASE_URL=http://127.0.0.1:8000 \
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:3001 \
          npm run test:e2e

      - name: Rerun failed chromium tests for diagnostics
        if: failure()
        continue-on-error: true
        run: |
          cd frontend
          PLAYWRIGHT_API_BASE_URL=http://127.0.0.1:8000 \
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:3001 \
          npm run test:e2e -- --last-failed --output=test-results/last-failed

      - name: Show backend logs on failure
        if: failure()
        run: |
          echo "===== frontend-e2e-backend.log ====="
          cat /tmp/frontend-e2e-backend.log || true

      - name: Build Playwright failure index
        if: always()
        run: |
          {
            echo "# frontend-e2e failure index"
            echo
            echo "- generated_at_utc: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "- run_id: ${{ github.run_id }}"
            echo "- run_attempt: ${{ github.run_attempt }}"
            echo
            if [ -d frontend/test-results ]; then
              echo "## error-context.md"
              find frontend/test-results -name "error-context.md" | sort | sed 's#^#- #'
              echo
              echo "## trace.zip"
              find frontend/test-results -name "trace.zip" | sort | sed 's#^#- #'
            else
              echo "No frontend/test-results directory found."
            fi
          } > /tmp/frontend-e2e-failure-index.md

      - name: Summarize export assertion diagnostics
        if: always()
        run: |
          summary_file=/tmp/frontend-e2e-export-summary.md
          {
            echo "# frontend-e2e export diagnostics"
            echo
            echo "- generated_at_utc: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo

            if [ ! -d frontend/test-results ]; then
              echo "No frontend/test-results directory found."
              exit 0
            fi

            mapfile -t main_contexts < <(find frontend/test-results -name "error-context.md" | sort | grep "workbench-main-path" || true)
            echo "## workbench-main-path"
            if [ ${#main_contexts[@]} -eq 0 ]; then
              echo "No workbench-main-path error-context files found."
            else
              echo "### matched error-context files"
              for file in "${main_contexts[@]}"; do
                echo "- ${file}"
              done
              echo

              main_ui_hint_count=0
              main_header_hint_count=0
              main_api_hint_count=0
              for file in "${main_contexts[@]}"; do
                ui_hits=$(grep -Eci "waitForEvent\\(\"download\"\\)|suggestedFilename|task-detail-export|sidebar-session-export|download event" "$file" || true)
                header_hits=$(grep -Eci "content-type|content-disposition|application/json|text/markdown|attachment;" "$file" || true)
                api_hits=$(grep -Eci "/api/(tasks|sessions)/[^ ]*/export/(json|markdown)" "$file" || true)
                main_ui_hint_count=$((main_ui_hint_count + ui_hits))
                main_header_hint_count=$((main_header_hint_count + header_hits))
                main_api_hint_count=$((main_api_hint_count + api_hits))
              done

              echo "### assertion hint counters"
              echo "- ui_download_layer_hints: ${main_ui_hint_count}"
              echo "- response_header_layer_hints: ${main_header_hint_count}"
              echo "- export_api_path_hints: ${main_api_hint_count}"
              echo

              echo "### key lines"
              for file in "${main_contexts[@]}"; do
                grep -Ein "download|suggestedfilename|content-type|content-disposition|application/json|text/markdown|/api/(tasks|sessions)/.*export/(json|markdown)" "$file" || true
              done | head -n 120
            fi
            echo

            mapfile -t edge_contexts < <(find frontend/test-results -name "error-context.md" | sort | grep "workbench-edge-cases" || true)
            echo "## workbench-edge-cases"
            if [ ${#edge_contexts[@]} -eq 0 ]; then
              echo "No workbench-edge-cases error-context files found."
            else
              echo "### matched error-context files"
              for file in "${edge_contexts[@]}"; do
                echo "- ${file}"
              done
              echo

              edge_ui_hint_count=0
              edge_header_hint_count=0
              edge_api_hint_count=0
              edge_404_semantic_hints=0
              for file in "${edge_contexts[@]}"; do
                ui_hits=$(grep -Eci "waitForEvent\\(\"download\"\\)|suggestedFilename|task-detail-export|sidebar-session-export|download event" "$file" || true)
                header_hits=$(grep -Eci "content-type|content-disposition|application/json|text/markdown|attachment;" "$file" || true)
                api_hits=$(grep -Eci "/api/(tasks|sessions)/[^ ]*/export/(json|markdown)" "$file" || true)
                semantic_hits=$(grep -Eci "404|not found|task not found|session not found|cross-user|ownership|isolat" "$file" || true)
                edge_ui_hint_count=$((edge_ui_hint_count + ui_hits))
                edge_header_hint_count=$((edge_header_hint_count + header_hits))
                edge_api_hint_count=$((edge_api_hint_count + api_hits))
                edge_404_semantic_hints=$((edge_404_semantic_hints + semantic_hits))
              done

              echo "### assertion hint counters"
              echo "- ui_download_layer_hints: ${edge_ui_hint_count}"
              echo "- response_header_layer_hints: ${edge_header_hint_count}"
              echo "- export_api_path_hints: ${edge_api_hint_count}"
              echo "- export_404_semantic_hints: ${edge_404_semantic_hints}"
              echo

              echo "### key lines"
              for file in "${edge_contexts[@]}"; do
                grep -Ein "download|suggestedfilename|content-type|content-disposition|application/json|text/markdown|/api/(tasks|sessions)/.*export/(json|markdown)|404|not found|cross-user|ownership|isolat" "$file" || true
              done | head -n 120
            fi
          } | tee "${summary_file}"

          {
            echo "### frontend-e2e export diagnostics"
            cat "${summary_file}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            frontend/playwright-report
            frontend/test-results
            /tmp/frontend-e2e-failure-index.md
            /tmp/frontend-e2e-export-summary.md
          if-no-files-found: ignore
