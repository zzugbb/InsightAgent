name: frontend-e2e

on:
  workflow_dispatch:
    inputs:
      export_diag_strict_level:
        description: "Override export diagnostics strict level (auto/none/p0/any)"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - none
          - p0
          - any
      artifact_stage_strict_level:
        description: "Override artifact stage strict level (auto/none/warn/fail-on-empty/fail-on-missing)"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - none
          - warn
          - fail-on-empty
          - fail-on-missing
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/frontend-e2e.yml"
      - "compose.full.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/frontend-e2e.yml"
      - "compose.full.yml"

concurrency:
  group: frontend-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  FRONTEND_EXPORT_DIAG_STRICT_LEVEL_DEFAULT: "p0"
  FRONTEND_EXPORT_DIAG_STRICT_LEVEL_MAIN_PUSH: "any"
  FRONTEND_ARTIFACT_STAGE_STRICT_LEVEL_DEFAULT: "warn"
  FRONTEND_ARTIFACT_STAGE_STRICT_LEVEL_MAIN_PUSH: "warn"
  FRONTEND_ARTIFACT_STAGE_STRICT_LEVEL_PR: "fail-on-empty"
  FRONTEND_ARTIFACT_STAGE_MIN_INCLUDED_COUNT: "2"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: insight
          POSTGRES_PASSWORD: insight
          POSTGRES_DB: insightagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U insight -d insightagent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      chroma:
        image: chromadb/chroma:latest
        env:
          IS_PERSISTENT: "FALSE"
          ANONYMIZED_TELEMETRY: "FALSE"
        ports:
          - 8001:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start backend on :8000
        env:
          INSIGHT_AGENT_DATABASE_URL: postgresql://insight:insight@127.0.0.1:5432/insightagent
          CHROMA_HOST: 127.0.0.1
          CHROMA_PORT: "8001"
        run: |
          bash scripts/ci_boot_backend_instance.sh \
            --port 8000 \
            --log-file /tmp/frontend-e2e-backend.log \
            --failure-message "backend failed to become healthy"

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browser
        run: cd frontend && npx playwright install --with-deps chromium firefox webkit

      - name: Run frontend smoke e2e matrix
        run: |
          bash scripts/ci_run_frontend_e2e.sh \
            --phase smoke \
            --api-base-url http://127.0.0.1:8000 \
            --frontend-base-url http://127.0.0.1:3001

      - name: Run frontend full e2e on chromium
        run: |
          bash scripts/ci_run_frontend_e2e.sh \
            --phase full \
            --api-base-url http://127.0.0.1:8000 \
            --frontend-base-url http://127.0.0.1:3001

      - name: Rerun failed chromium tests for diagnostics
        if: failure()
        continue-on-error: true
        run: |
          bash scripts/ci_run_frontend_e2e.sh \
            --phase rerun-last-failed \
            --api-base-url http://127.0.0.1:8000 \
            --frontend-base-url http://127.0.0.1:3001

      - name: Show backend logs on failure
        if: failure()
        run: |
          bash scripts/ci_print_log_files.sh \
            --title "frontend e2e backend logs" \
            --file /tmp/frontend-e2e-backend.log

      - name: Build Playwright failure index
        if: always()
        run: |
          bash scripts/ci_build_frontend_failure_index.sh \
            --results-dir frontend/test-results \
            --output-file /tmp/frontend-e2e-failure-index.md \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}"

      - name: Validate e2e tooling fixtures (frontend scope)
        run: bash scripts/test_ci_e2e_tooling.sh frontend

      - name: Finalize frontend diagnostics and artifacts
        id: finalize_frontend
        if: always()
        run: |
          dispatch_override="${{ github.event.inputs.export_diag_strict_level || '' }}"
          bash scripts/ci_finalize_e2e_for_workflow.sh \
            --scope frontend \
            --dispatch-override "${dispatch_override:-auto}" \
            --min-included-count "${FRONTEND_ARTIFACT_STAGE_MIN_INCLUDED_COUNT}" \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --github-output-file "$GITHUB_OUTPUT" \
            --quiet

      - name: Evaluate frontend artifact stage guard
        if: always() && steps.finalize_frontend.conclusion == 'success'
        run: |
          artifact_dispatch_override="${{ github.event.inputs.artifact_stage_strict_level || '' }}"
          bash scripts/ci_run_artifact_stage_guard.sh \
            --scope frontend \
            --repo-root "${{ github.workspace }}" \
            --base-sha "${{ github.event.pull_request.base.sha || '' }}" \
            --head-sha "${{ github.sha }}" \
            --event-name "${GITHUB_EVENT_NAME}" \
            --ref "${GITHUB_REF}" \
            --dispatch-override "${artifact_dispatch_override:-auto}" \
            --fallback-level "${FRONTEND_ARTIFACT_STAGE_STRICT_LEVEL_DEFAULT}" \
            --pr-level "${FRONTEND_ARTIFACT_STAGE_STRICT_LEVEL_PR}" \
            --included-count "${{ steps.finalize_frontend.outputs.artifact_included_count }}" \
            --missing-count "${{ steps.finalize_frontend.outputs.artifact_missing_count }}" \
            --min-included-count "${FRONTEND_ARTIFACT_STAGE_MIN_INCLUDED_COUNT}" \
            --stage-dir "${{ steps.finalize_frontend.outputs.artifacts_stage_dir }}" \
            --manifest "${{ steps.finalize_frontend.outputs.artifact_manifest }}" \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --guard-markdown-out /tmp/frontend-e2e-artifact-guard-summary.md \
            --guard-json-out /tmp/frontend-e2e-artifact-guard-summary.json

      - name: Skip frontend artifact stage guard when finalize failed
        if: always() && steps.finalize_frontend.conclusion != 'success'
        run: |
          bash scripts/ci_write_skipped_artifact_guard_summary.sh \
            --scope frontend \
            --summary-file "$GITHUB_STEP_SUMMARY" \
            --reason "finalize_frontend step did not succeed"

      - name: Upload Playwright report
        if: always() && steps.finalize_frontend.conclusion == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.finalize_frontend.outputs.artifact_name }}
          path: ${{ steps.finalize_frontend.outputs.artifacts_stage_dir }}
          if-no-files-found: ignore
