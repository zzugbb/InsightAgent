name: frontend-e2e

on:
  workflow_dispatch:
    inputs:
      export_diag_strict_level:
        description: "Override export diagnostics strict level (auto/none/p0/any)"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - none
          - p0
          - any
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/frontend-e2e.yml"
      - "compose.full.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/frontend-e2e.yml"
      - "compose.full.yml"

concurrency:
  group: frontend-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  FRONTEND_EXPORT_DIAG_STRICT_LEVEL_DEFAULT: "p0"
  FRONTEND_EXPORT_DIAG_STRICT_LEVEL_MAIN_PUSH: "any"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: insight
          POSTGRES_PASSWORD: insight
          POSTGRES_DB: insightagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U insight -d insightagent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      chroma:
        image: chromadb/chroma:latest
        env:
          IS_PERSISTENT: "FALSE"
          ANONYMIZED_TELEMETRY: "FALSE"
        ports:
          - 8001:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start backend on :8000
        env:
          INSIGHT_AGENT_DATABASE_URL: postgresql://insight:insight@127.0.0.1:5432/insightagent
          CHROMA_HOST: 127.0.0.1
          CHROMA_PORT: "8001"
        run: |
          nohup uvicorn app.main:app --app-dir backend --host 127.0.0.1 --port 8000 >/tmp/frontend-e2e-backend.log 2>&1 &

      - name: Wait backend health
        run: |
          for i in {1..60}; do
            code=$(curl -s -o /tmp/frontend-e2e-health.json -w "%{http_code}" http://127.0.0.1:8000/health || true)
            if [ "$code" = "200" ]; then
              cat /tmp/frontend-e2e-health.json
              exit 0
            fi
            sleep 1
          done
          echo "backend failed to become healthy"
          cat /tmp/frontend-e2e-backend.log || true
          exit 1

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browser
        run: cd frontend && npx playwright install --with-deps chromium firefox webkit

      - name: Run frontend smoke e2e matrix
        run: |
          cd frontend
          PLAYWRIGHT_API_BASE_URL=http://127.0.0.1:8000 \
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:3001 \
          npm run test:e2e:smoke:matrix

      - name: Run frontend full e2e on chromium
        run: |
          cd frontend
          PLAYWRIGHT_API_BASE_URL=http://127.0.0.1:8000 \
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:3001 \
          npm run test:e2e

      - name: Rerun failed chromium tests for diagnostics
        if: failure()
        continue-on-error: true
        run: |
          cd frontend
          PLAYWRIGHT_API_BASE_URL=http://127.0.0.1:8000 \
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:3001 \
          npm run test:e2e -- --last-failed --output=test-results/last-failed

      - name: Show backend logs on failure
        if: failure()
        run: |
          echo "===== frontend-e2e-backend.log ====="
          cat /tmp/frontend-e2e-backend.log || true

      - name: Build Playwright failure index
        if: always()
        run: |
          {
            echo "# frontend-e2e failure index"
            echo
            echo "- generated_at_utc: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "- run_id: ${{ github.run_id }}"
            echo "- run_attempt: ${{ github.run_attempt }}"
            echo
            if [ -d frontend/test-results ]; then
              echo "## error-context.md"
              find frontend/test-results -name "error-context.md" | sort | sed 's#^#- #'
              echo
              echo "## trace.zip"
              find frontend/test-results -name "trace.zip" | sort | sed 's#^#- #'
            else
              echo "No frontend/test-results directory found."
            fi
          } > /tmp/frontend-e2e-failure-index.md

      - name: Validate e2e tooling fixtures (frontend scope)
        run: bash scripts/test_ci_e2e_tooling.sh frontend

      - name: Summarize export assertion diagnostics
        if: always()
        run: |
          summary_file=/tmp/frontend-e2e-export-summary.md
          bash frontend/scripts/ci_export_diagnostics.sh frontend/test-results /tmp/frontend-e2e-export-summary.json | tee "${summary_file}"

          {
            echo "### frontend-e2e export diagnostics"
            cat "${summary_file}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Evaluate export diagnostics guard
        if: always()
        id: frontend_diag_guard
        run: |
          dispatch_override="${{ github.event.inputs.export_diag_strict_level || '' }}"
          resolved=$(bash scripts/ci_resolve_diag_strict_level.sh \
            --event-name "${GITHUB_EVENT_NAME}" \
            --ref "${GITHUB_REF}" \
            --default-level "${FRONTEND_EXPORT_DIAG_STRICT_LEVEL_DEFAULT}" \
            --main-push-level "${FRONTEND_EXPORT_DIAG_STRICT_LEVEL_MAIN_PUSH}" \
            --dispatch-override "${dispatch_override:-auto}")
          strict_level=$(printf '%s\n' "${resolved}" | sed -n 's/^strict_level=//p')
          policy_source=$(printf '%s\n' "${resolved}" | sed -n 's/^policy_source=//p')

          bash scripts/ci_diag_guard.sh \
            --json /tmp/frontend-e2e-export-summary.json \
            --scope frontend \
            --strict-level "${strict_level}" \
            --label frontend-e2e-export \
            --summary-file /tmp/frontend-e2e-export-guard-summary.md \
            --json-summary-file /tmp/frontend-e2e-export-guard-summary.json

          echo "strict_level=${strict_level}" >> "$GITHUB_OUTPUT"
          echo "policy_source=${policy_source}" >> "$GITHUB_OUTPUT"

          {
            echo "### frontend-e2e export diagnostics guard"
            echo "- policy: default=${FRONTEND_EXPORT_DIAG_STRICT_LEVEL_DEFAULT}, main_push=${FRONTEND_EXPORT_DIAG_STRICT_LEVEL_MAIN_PUSH}"
            echo "- dispatch_override: ${dispatch_override:-<none>}"
            echo "- policy_source: ${policy_source}"
            echo "- selected_strict_level: ${strict_level}"
            cat /tmp/frontend-e2e-export-guard-summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build export diagnostics overview
        if: always()
        run: |
          bash scripts/ci_export_diagnostics_overview.sh \
            --frontend-diagnostics-json /tmp/frontend-e2e-export-summary.json \
            --frontend-guard-json /tmp/frontend-e2e-export-guard-summary.json \
            --markdown-out /tmp/frontend-e2e-export-overview.md \
            --json-out /tmp/frontend-e2e-export-overview.json \
            --label frontend-e2e

          {
            echo "### frontend-e2e export diagnostics overview"
            cat /tmp/frontend-e2e-export-overview.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            frontend/playwright-report
            frontend/test-results
            /tmp/frontend-e2e-failure-index.md
            /tmp/frontend-e2e-export-summary.md
            /tmp/frontend-e2e-export-summary.json
            /tmp/frontend-e2e-export-guard-summary.md
            /tmp/frontend-e2e-export-guard-summary.json
            /tmp/frontend-e2e-export-overview.md
            /tmp/frontend-e2e-export-overview.json
          if-no-files-found: ignore
