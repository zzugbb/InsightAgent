name: frontend-e2e

on:
  workflow_dispatch:
    inputs:
      export_diag_strict_level:
        description: "Override export diagnostics strict level (auto/none/p0/any)"
        required: false
        default: auto
        type: choice
        options:
          - auto
          - none
          - p0
          - any
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/frontend-e2e.yml"
      - "compose.full.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/frontend-e2e.yml"
      - "compose.full.yml"

concurrency:
  group: frontend-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  FRONTEND_EXPORT_DIAG_STRICT_LEVEL_DEFAULT: "p0"
  FRONTEND_EXPORT_DIAG_STRICT_LEVEL_MAIN_PUSH: "any"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: insight
          POSTGRES_PASSWORD: insight
          POSTGRES_DB: insightagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U insight -d insightagent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      chroma:
        image: chromadb/chroma:latest
        env:
          IS_PERSISTENT: "FALSE"
          ANONYMIZED_TELEMETRY: "FALSE"
        ports:
          - 8001:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start backend on :8000
        env:
          INSIGHT_AGENT_DATABASE_URL: postgresql://insight:insight@127.0.0.1:5432/insightagent
          CHROMA_HOST: 127.0.0.1
          CHROMA_PORT: "8001"
        run: |
          bash scripts/ci_start_bg_process.sh \
            --log-file /tmp/frontend-e2e-backend.log \
            -- uvicorn app.main:app --app-dir backend --host 127.0.0.1 --port 8000

      - name: Wait backend health
        run: |
          bash scripts/ci_wait_http_status.sh \
            --url http://127.0.0.1:8000/health \
            --output-file /tmp/frontend-e2e-health.json \
            --attempts 60 \
            --interval-sec 1 \
            --failure-message "backend failed to become healthy" \
            --failure-log-file /tmp/frontend-e2e-backend.log

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install Playwright browser
        run: cd frontend && npx playwright install --with-deps chromium firefox webkit

      - name: Run frontend smoke e2e matrix
        run: |
          bash scripts/ci_run_frontend_e2e.sh \
            --phase smoke \
            --api-base-url http://127.0.0.1:8000 \
            --frontend-base-url http://127.0.0.1:3001

      - name: Run frontend full e2e on chromium
        run: |
          bash scripts/ci_run_frontend_e2e.sh \
            --phase full \
            --api-base-url http://127.0.0.1:8000 \
            --frontend-base-url http://127.0.0.1:3001

      - name: Rerun failed chromium tests for diagnostics
        if: failure()
        continue-on-error: true
        run: |
          bash scripts/ci_run_frontend_e2e.sh \
            --phase rerun-last-failed \
            --api-base-url http://127.0.0.1:8000 \
            --frontend-base-url http://127.0.0.1:3001

      - name: Show backend logs on failure
        if: failure()
        run: |
          echo "===== frontend-e2e-backend.log ====="
          cat /tmp/frontend-e2e-backend.log || true

      - name: Build Playwright failure index
        if: always()
        run: |
          bash scripts/ci_build_frontend_failure_index.sh \
            --results-dir frontend/test-results \
            --output-file /tmp/frontend-e2e-failure-index.md \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}"

      - name: Validate e2e tooling fixtures (frontend scope)
        run: bash scripts/test_ci_e2e_tooling.sh frontend

      - name: Run export diagnostics flow
        if: always()
        run: |
          dispatch_override="${{ github.event.inputs.export_diag_strict_level || '' }}"
          bash scripts/ci_export_diag_flow.sh \
            --scope frontend \
            --source-path frontend/test-results \
            --diagnostics-markdown-out /tmp/frontend-e2e-export-summary.md \
            --diagnostics-json-out /tmp/frontend-e2e-export-summary.json \
            --guard-markdown-out /tmp/frontend-e2e-export-guard-summary.md \
            --guard-json-out /tmp/frontend-e2e-export-guard-summary.json \
            --overview-markdown-out /tmp/frontend-e2e-export-overview.md \
            --overview-json-out /tmp/frontend-e2e-export-overview.json \
            --event-name "${GITHUB_EVENT_NAME}" \
            --ref "${GITHUB_REF}" \
            --default-level "${FRONTEND_EXPORT_DIAG_STRICT_LEVEL_DEFAULT}" \
            --main-push-level "${FRONTEND_EXPORT_DIAG_STRICT_LEVEL_MAIN_PUSH}" \
            --dispatch-override "${dispatch_override:-auto}" \
            --label frontend-e2e-export \
            --overview-label frontend-e2e \
            --summary-file "$GITHUB_STEP_SUMMARY"

      - name: Stage frontend e2e artifacts
        if: always()
        run: |
          bash scripts/ci_stage_artifacts.sh \
            --list-file scripts/ci_artifacts_frontend.txt \
            --output-dir /tmp/frontend-e2e-artifacts-stage

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: /tmp/frontend-e2e-artifacts-stage
          if-no-files-found: ignore
